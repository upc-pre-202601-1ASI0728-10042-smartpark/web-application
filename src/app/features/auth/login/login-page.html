<div class="login">
  <div class="login__card">
    <div class="login__brand">
      <span class="login__logo"><sp-icon name="parking" [size]="34" /></span>
      <h1>SmartPark</h1>
      <p class="login__subtitle">Panel del Operador</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label class="field" [class.field--invalid]="form.controls.email.touched && form.controls.email.invalid">
        <span class="field__label">Correo electrónico</span>
        <input
          type="email"
          formControlName="email"
          autocomplete="username"
          placeholder="operador@smartpark.pe"
          [attr.aria-invalid]="form.controls.email.touched && form.controls.email.invalid"
          aria-describedby="email-error"
        />
        @if (form.controls.email.touched && form.controls.email.invalid) {
          <span class="field__error" id="email-error">Ingresa un correo válido.</span>
        }
      </label>

      <label class="field" [class.field--invalid]="form.controls.password.touched && form.controls.password.invalid">
        <span class="field__label">Contraseña</span>
        <input
          type="password"
          formControlName="password"
          autocomplete="current-password"
          placeholder="••••••••"
          [attr.aria-invalid]="form.controls.password.touched && form.controls.password.invalid"
          aria-describedby="password-error"
        />
        @if (form.controls.password.touched && form.controls.password.invalid) {
          <span class="field__error" id="password-error">Mínimo 6 caracteres.</span>
        }
      </label>

      @if (error()) {
        <div class="login__error" role="alert">{{ error() }}</div>
      }

      <button
        class="sp-btn sp-btn--primary login__submit"
        type="submit"
        [disabled]="loading()"
        [attr.aria-busy]="loading()"
      >
        {{ loading() ? 'Ingresando…' : 'Iniciar sesión' }}
      </button>
    </form>
  </div>
</div>
