<div class="login">
  <div class="login__card">
    <div class="login__brand">
      <span class="login__logo">🅿️</span>
      <h1>SmartPark</h1>
      <p class="login__subtitle">Panel del Operador · Apex Twin</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label class="field">
        <span class="field__label">Correo electrónico</span>
        <input
          type="email"
          formControlName="email"
          autocomplete="username"
          placeholder="operador@smartpark.pe"
        />
        @if (form.controls.email.touched && form.controls.email.invalid) {
          <span class="field__error">Ingresa un correo válido.</span>
        }
      </label>

      <label class="field">
        <span class="field__label">Contraseña</span>
        <input
          type="password"
          formControlName="password"
          autocomplete="current-password"
          placeholder="••••••••"
        />
        @if (form.controls.password.touched && form.controls.password.invalid) {
          <span class="field__error">Mínimo 6 caracteres.</span>
        }
      </label>

      @if (error()) {
        <div class="login__error">{{ error() }}</div>
      }

      <button class="sp-btn sp-btn--primary login__submit" type="submit" [disabled]="loading()">
        {{ loading() ? 'Ingresando…' : 'Iniciar sesión' }}
      </button>
    </form>
  </div>
</div>
